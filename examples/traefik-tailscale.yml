api:
  insecure: false
  dashboard: false

# KEIN HTTP Provider - nur statische Routes
providers:
  file:
    filename: "/etc/traefik/dynamic_config.yml"

log:
  level: "INFO"
  format: "common"
  maxSize: 100
  maxBackups: 3
  maxAge: 7
  compress: true

# Dashboard EntryPoint (Tailscale only)
entryPoints:
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: "letsencrypt"
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: "websecure"
          scheme: "https"
          permanent: true

# Let's Encrypt mit Cloudflare DNS-01
certificatesResolvers:
  letsencrypt:
    acme:
      email: "DEINE_EMAIL@beispiel.de"
      storage: "/letsencrypt/acme.json"
      dnsChallenge:
        provider: "cloudflare"
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"
        delayBeforeCheck: 10
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
